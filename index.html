<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vegan Calculator - Calculate Your Environmental Impact</title>
  <meta name="description" content="Calculate your impact as a vegan. See how many animals, lbs of Grain, Gallons of Water, Sq Ft of Forest and lbs of Co2 you've saved. Every day counts!">
  <meta name="keywords" content="Vegan Calculator, environmental impact, save animals, planet, veganism">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thevegancalculator.com/">
  <meta property="og:title" content="The Vegan Calculator - Calculate Your Environmental Impact">
  <meta property="og:description" content="Calculate your impact as a vegan. See how many animals, lbs of Grain, Gallons of Water, Sq Ft of Forest and lbs of Co2 you've saved.">
  <meta property="og:image" content="assets/tvwd_logo.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://thevegancalculator.com/">
  <meta property="twitter:title" content="The Vegan Calculator - Calculate Your Environmental Impact">
  <meta property="twitter:description" content="Calculate your impact as a vegan. See how many animals, lbs of Grain, Gallons of Water, Sq Ft of Forest and lbs of Co2 you've saved.">
  <meta property="twitter:image" content="assets/tvwd_logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<body>

  <div data-component="full-screen-menu.html"></div>

  <div class="page-wrapper full-green-theme">

    <div class="header-section" data-component="main-header.html"></div>

    <div class="desktop-relative-container w-full max-w-[1440px] mx-auto flex flex-col items-center">
      <h1 class="text-center font-bold mb-4 hidden-mobile">How long have you been vegan?</h1>
      <div class="calculator-inputs-container container">
        <div class="calculator-inputs">
          <div class="input-row rounded">
            <button id="dec-years" class="btn-circle btn-gradient">-</button>
            <div class="input-value">
              <input type="number" id="val-years" class="typable-input" value="0" min="0" max="999">
              <span class="input-label">Years</span>
            </div>
            <button id="inc-years" class="btn-circle btn-gradient">+</button>
          </div>

          <div class="input-row rounded">
            <button id="dec-months" class="btn-circle btn-gradient">-</button>
            <div class="input-value">
              <input type="number" id="val-months" class="typable-input" value="0" min="0" max="11">
              <span class="input-label">Months</span>
            </div>
            <button id="inc-months" class="btn-circle btn-gradient">+</button>
          </div>

          <button id="btn-calculate" class="btn btn-red w-full mt-2">
            Calculate
            <span class="material-symbols-rounded icon-xs ml-1">chevron_right</span>
          </button>
        </div>
      </div>

      <!-- WHITE BOTTOM SECTION (Results & Recommend) -->
      <main class="main-content container relative z-10 w-full">
        <div class="main-card shadow rounded">

          <h1 id="calc-headline" class="headline text-gradient">Every day as a vegan you save:</h1>

          <!-- Results Section -->
          <div id="stats-container" class="stats-container uncalculated">
            <div class="stats-grid">
              <!-- Animal Life -->
              <div class="stat-card stat-full rounded-gradient">
                <span class="material-symbols-rounded icon-lg">cruelty_free</span>
                <div class="stat-data">
                  <span id="stat-animals" class="stat-number">1</span>
                  <span class="stat-label">Animal Life</span>
                </div>
              </div>

              <!-- Water -->
              <div class="stat-card stat-half rounded-gradient">
                <span class="material-symbols-rounded icon">water_drop</span>
                <div class="stat-data stat-center">
                  <span id="stat-water" class="stat-number mt-1">1,100</span>
                  <span id="label-water" class="stat-label">Gallons of Water</span>
                </div>
              </div>

              <!-- Grain -->
              <div class="stat-card stat-half rounded-gradient">
                <span class="material-symbols-rounded icon">wheat</span>
                <div class="stat-data stat-center">
                  <span id="stat-grain" class="stat-number mt-1">40</span>
                  <span id="label-grain" class="stat-label">Lbs of Grain</span>
                </div>
              </div>

              <!-- Co2 -->
              <div class="stat-card stat-half rounded-gradient">
                <span class="material-symbols-rounded icon">air</span>
                <div class="stat-data stat-center">
                  <span id="stat-co2" class="stat-number mt-1">20</span>
                  <span id="label-co2" class="stat-label">lbs of Co2</span>
                </div>
              </div>

              <!-- Forest -->
              <div class="stat-card stat-half rounded-gradient">
                <span class="material-symbols-rounded icon">forest</span>
                <div class="stat-data stat-center">
                  <span id="stat-forest" class="stat-number mt-1">30</span>
                  <span id="label-forest" class="stat-label">Sq Ft Forest</span>
                </div>
              </div>

              <a href="https://cowspiracy.com/facts" target="_blank" class="btn btn-source">
                Statistic Source (Cowspiracy)<span class="material-symbols-rounded icon-xs ml-1">open_in_new</span>
              </a>
            </div>
          </div>

          <div data-component="recommended-section.html"></div>
        </div> <!-- /main-card -->
      </main>
    </div> <!-- /desktop-relative-container -->
    <div data-component="footer.html"></div>
  </div> <!-- /page-wrapper -->

  <script src="js/analytics.js"></script>
  <script src="js/components.js"></script>
  <script src="js/recommendations-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/recommendations.js"></script>
</body>

</html>
